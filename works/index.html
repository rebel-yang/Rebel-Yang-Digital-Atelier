<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works - Rebel Yang</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .works-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 50px; }
        
        .work-card {
            border: var(--border); background: white;
            transition: all 0.4s var(--ease);
            display: block; position: relative;
        }
        .work-card:hover { transform: translateY(-15px); box-shadow: 15px 15px 0 var(--c-blue); }
        
        .thumb {
            height: 240px; background: #ddd; border-bottom: var(--border); overflow: hidden;
            position: relative;
        }
        .thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; filter: grayscale(20%); }
        .work-card:hover .thumb img { transform: scale(1.1); filter: grayscale(0%); }
        
        .info { padding: 30px; }
        .work-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 10px; line-height: 1.1; }
        .tags { display: flex; gap: 10px; margin-bottom: 15px; }
        .tag { background: var(--c-yellow); padding: 4px 10px; border: 2px solid black; font-weight: bold; font-size: 0.8rem; }
        .desc { font-size: 0.95rem; color: #555; }
        
        /* 背景装饰 */
        .big-rect { width: 400px; height: 600px; border: 10px solid var(--c-red); opacity: 0.1; right: -100px; top: 100px; }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    <div class="bg-art">
        <div class="float-shape big-rect"></div>
    </div>

    <button id="langToggle" class="lang-btn">CN / EN</button>

    <nav class="side-nav">
        <a href="../index.html" class="nav-item" data-page="home">HOME</a>
        <a href="index.html" class="nav-item active" data-page="works">WORKS</a>
        <a href="../thoughts/index.html" class="nav-item" data-page="thoughts">THOUGHTS</a>
    </nav>

    <div class="container fade-in-up">
        <h1 class="page-title">WORKS</h1>
        
        <div class="works-grid">
            <!-- 作品 1 -->
            <a href="break-then.html" class="work-card">
                <div class="thumb">
                    <img src="../assets/break-thumb.jpg" alt="Break Then" onerror="this.src='https://via.placeholder.com/600x400/000?text=Break+Then'">
                </div>
                <div class="info">
                    <div class="work-title">Break, then…</div>
                    <div class="tags"><span class="tag">2025</span><span class="tag">AI Video</span></div>
                    <div class="desc">
                        <span class="lang-cn">生命本如宇宙大爆炸般伟大神秘，孩童天马行空的创意在成长过程中被不断修剪...</span>
                        <span class="lang-en">Life is inherently as magnificent and mysterious as the Big Bang...</span>
                    </div>
                </div>
            </a>

            <!-- 作品 2 -->
            <a href="sands-of-illusion.html" class="work-card">
                <div class="thumb">
                    <img src="../assets/sands-thumb.jpg" alt="Sands" onerror="this.src='https://via.placeholder.com/600x400/FD0?text=Sands'">
                </div>
                <div class="info">
                    <div class="work-title">Sands of Illusion</div>
                    <div class="tags"><span class="tag">2025</span><span class="tag">AI Video</span></div>
                    <div class="desc">
                        <span class="lang-cn">一支商队在丝路迷宫中的轮回之旅，于几何幻境中叩问文明相遇的永恒真相。</span>
                        <span class="lang-en">A merchant caravan’s cyclical journey through a Silk Road labyrinth...</span>
                    </div>
                </div>
            </a>
        </div>
    </div>
    <script src="../script.js"></script>
</body>
</html>

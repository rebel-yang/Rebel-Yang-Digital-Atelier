<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works - Rebel Yang</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .works-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 50px; }
        
        .work-card {
            border: var(--border); background: var(--c-white);
            position: relative; display: block;
            transition: 0.2s;
        }
        /* 悬停效果：像按下按钮 */
        .work-card:hover {
            transform: translate(-10px, -10px);
            box-shadow: 15px 15px 0 var(--c-red);
        }

        .thumb {
            height: 220px; background: #000;
            border-bottom: var(--border); overflow: hidden;
            position: relative;
        }
        .thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 0.3s; }
        .work-card:hover .thumb img { opacity: 1; transform: scale(1.1); }

        .info { padding: 20px; border-top: 4px solid var(--c-yellow); }
        .work-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; font-family: 'Press Start 2P'; line-height: 1.4; }
        
        .tags { display: flex; gap: 10px; margin-bottom: 15px; }
        .tag { background: var(--c-black); color: var(--c-yellow); padding: 5px 10px; font-size: 10px; font-family: 'Press Start 2P'; }
        
        .desc { font-size: 0.9rem; color: #555; height: 3em; overflow: hidden; }

        .s3 { width: 200px; height: 200px; border: 10px solid var(--c-blue); right: -50px; top: 50px; transform: rotate(45deg); }
    </style>
</head>
<body>
    <div class="race-bg"></div>
    <div class="geo-layer"><div class="shape s3"></div></div>

    <button id="langToggle" class="lang-switch">CN/EN</button>

    <nav class="side-nav">
        <a href="../index.html" class="nav-item" data-page="home">HOME</a>
        <a href="index.html" class="nav-item active" data-page="works">WORKS</a>
        <a href="../thoughts/index.html" class="nav-item" data-page="thoughts">THOUGHTS</a>
    </nav>

    <div class="container">
        <h1 class="site-title">SELECT WORKS</h1>
        
        <div class="works-grid">
            <!-- 作品 1 -->
            <a href="break-then.html" class="work-card">
                <div class="thumb">
                    <img src="../assets/break-thumb.jpg" alt="Break Then" onerror="this.src='https://via.placeholder.com/600x400/000/FFF?text=BREAK'">
                </div>
                <div class="info">
                    <div class="work-title">Break, then…</div>
                    <div class="tags"><span class="tag">2025</span><span class="tag">AI VIDEO</span></div>
                    <div class="desc">
                        <span class="lang-cn">生命本如宇宙大爆炸般伟大神秘，孩童天马行空的创意...</span>
                        <span class="lang-en">Life is inherently as magnificent and mysterious as the Big Bang...</span>
                    </div>
                </div>
            </a>

            <!-- 作品 2 -->
            <a href="sands-of-illusion.html" class="work-card">
                <div class="thumb">
                    <img src="../assets/sands-thumb.jpg" alt="Sands" onerror="this.src='https://via.placeholder.com/600x400/FD0/000?text=SANDS'">
                </div>
                <div class="info">
                    <div class="work-title">Sands of Illusion</div>
                    <div class="tags"><span class="tag">2025</span><span class="tag">AI VIDEO</span></div>
                    <div class="desc">
                        <span class="lang-cn">一支商队在丝路迷宫中的轮回之旅...</span>
                        <span class="lang-en">A merchant caravan’s cyclical journey...</span>
                    </div>
                </div>
            </a>
        </div>
    </div>
    <script src="../script.js"></script>
</body>
</html>

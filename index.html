<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rebel Yang - Digital Atelier</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* 首页独有样式 */
        body { overflow: hidden; } /* 禁止首页滚动 */
        
        .orbit-scene {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            perspective: 1000px;
        }

        /* 中心标题 */
        .center-title {
            position: absolute; z-index: 50;
            text-align: center; pointer-events: none;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
            mix-blend-mode: overlay;
        }
        .center-title h1 { font-size: 3rem; margin: 0; color: white; }
        .center-title p { font-family: 'Cinzel'; letter-spacing: 5px; color: var(--c-gold); }

        /* 交互感应区 (比卡牌范围大，方便触发) */
        .interaction-zone {
            position: absolute; width: 800px; height: 500px;
            z-index: 60;
            /* background: rgba(255,0,0,0.1); 调试用 */
        }

        /* 塔罗牌容器 */
        .orbit-container {
            position: absolute; top: 50%; left: 50%;
            width: 0; height: 0;
            transform-style: preserve-3d;
        }

        /* 单张卡牌 */
        .tarot-card {
            position: absolute;
            width: var(--card-width); height: var(--card-height);
            background: rgba(10, 10, 10, 0.85);
            border: 2px solid var(--c-gold);
            border-radius: 10px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); /* 平滑过渡 */
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            /* 内部装饰线 */
            padding: 10px;
        }

        .tarot-inner {
            width: 100%; height: 100%;
            border: 1px solid rgba(212, 175, 55, 0.3);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .card-icon { font-size: 3rem; margin-bottom: 20px; color: var(--c-gold); }
        .card-title { font-family: 'Cinzel'; font-size: 1.5rem; color: white; }
        .card-sub { font-size: 0.8rem; color: var(--c-gray); margin-top: 5px; text-transform: uppercase; }

        /* 卡牌悬停内部发光 */
        .tarot-card:hover .tarot-inner { border-color: var(--c-gold); background: rgba(212, 175, 55, 0.1); }

    </style>
</head>
<body>
    <canvas id="starfield"></canvas>
    <button id="langToggle" class="lang-switch">CN / EN</button>

    <div class="orbit-scene">
        <div class="center-title">
            <h1>REBEL YANG</h1>
            <p>DIGITAL ATELIER</p>
        </div>

        <div class="interaction-zone"></div>

        <div class="orbit-container">
            <!-- Card 1: PROFILE (原首页BIO) -->
            <a href="profile.html" class="tarot-card">
                <div class="tarot-inner">
                    <div class="card-icon">✦</div>
                    <div class="card-title">PROFILE</div>
                    <div class="card-sub">The Creator</div>
                </div>
            </a>

            <!-- Card 2: WORKS -->
            <a href="works/index.html" class="tarot-card">
                <div class="tarot-inner">
                    <div class="card-icon">❖</div>
                    <div class="card-title">WORKS</div>
                    <div class="card-sub">The Creation</div>
                </div>
            </a>

            <!-- Card 3: THOUGHTS -->
            <a href="thoughts/index.html" class="tarot-card">
                <div class="tarot-inner">
                    <div class="card-icon">☾</div>
                    <div class="card-title">THOUGHTS</div>
                    <div class="card-sub">The Wisdom</div>
                </div>
            </a>
        </div>
    </div>

    <script src="orbit.js"></script>
</body>
</html>
